<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>malcolmston/gltf — glTF 2.0 / GLB toolkit for Go</title>
<meta name="description" content="A dependency-free, standard-library-only Go toolkit for reading, writing, validating and decoding glTF 2.0 assets in both the JSON (.gltf) and binary (.glb) container formats: full document model, typed accessor decoding with sparse support, buffer resolution, structural validation and a triangle-mesh builder.">

</script>
